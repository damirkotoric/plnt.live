name: Render OG images

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libjpeg-dev libpng-dev libwebp-dev libuv1-dev xvfb
      - run: pnpm install --frozen-lockfile
      - name: Render
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: xvfb-run --auto-servernum pnpm tsx scripts/render-og.ts
